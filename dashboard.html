<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agrade dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #08080a;
      --white: #f4f3f0;
      --muted: rgba(244, 243, 240, 0.38);
      --surface: rgba(244, 243, 240, 0.04);
      --surface-hover: rgba(244, 243, 240, 0.07);
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 48px 80px;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s forwards;
    }

    .page-greeting {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 8px;
    }

    .page-greeting em {
      font-style: italic;
      color: var(--muted);
    }

    .page-subtitle {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 300;
    }

    .header-meta {
      text-align: right;
      flex-shrink: 0;
      padding-top: 6px;
    }

    .header-email {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 6px;
    }

    .btn-signout {
      font-size: 0.75rem;
      color: rgba(244,243,240,0.2);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      transition: color 0.2s;
      padding: 0;
      display: block;
      margin-left: auto;
    }

    .btn-signout:hover { color: var(--muted); }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.25s forwards;
    }

    @media (max-width: 640px) { .dashboard-grid { grid-template-columns: 1fr; } }

    .dash-card {
      background: var(--surface);
      border-radius: 18px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .dash-card-full { grid-column: 1 / -1; }

    .dash-card-label {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }

    .dash-card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--white);
      letter-spacing: -0.01em;
    }

    .dash-card-meta {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
      margin-top: 6px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(244,243,240,0.06);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      width: fit-content;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(244,243,240,0.3);
    }

    .status-dot.active {
      background: #6ee7b7;
      box-shadow: 0 0 6px rgba(110,231,183,0.5);
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      background: var(--white);
      color: var(--black);
      border: none;
      padding: 12px 24px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      width: fit-content;
    }

    .btn-download:hover { opacity: 0.85; transform: scale(1.02); }

    .btn-manage {
      display: inline-flex;
      align-items: center;
      background: var(--surface-hover);
      color: var(--muted);
      border: none;
      padding: 12px 24px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.84rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      width: fit-content;
    }

    .btn-manage:hover { background: rgba(244,243,240,0.1); color: var(--white); }

    .account-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <main class="page">

    <div class="page-header">
      <div>
        <p class="page-greeting">Good to see you, <em id="greetingName"></em></p>
        <p class="page-subtitle">Manage your subscription and download the latest version.</p>
      </div>
      <div class="header-meta">
        <p class="header-email" id="navEmail"></p>
        <button class="btn-signout" id="signOutBtn">Sign out</button>
      </div>
    </div>

    <div class="dashboard-grid">

      <div class="dash-card">
        <p class="dash-card-label">Subscription</p>
        <div>
          <p class="dash-card-title">No active plan</p>
          <p class="dash-card-meta">Choose a plan to unlock full access to the agrade overlay.</p>
        </div>
        <div class="status-pill">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Inactive</span>
        </div>
        <a href="index.html#pricing" class="btn-manage">View plans</a>
      </div>

      <div class="dash-card">
        <p class="dash-card-label">Download</p>
        <div>
          <p class="dash-card-title">agrade for Windows</p>
          <p class="dash-card-meta">Version 0.1.0 · Windows 10 / 11 · 64-bit</p>
        </div>
        <a href="https://github.com/sekotonjabulo-rgb/agrade/releases/latest/download/agrade_0.1.0_x64-setup.exe" class="btn-download">Download</a>
      </div>

      <div class="dash-card dash-card-full">
        <p class="dash-card-label">Account</p>
        <div class="account-row">
          <div>
            <p class="dash-card-title" id="accountEmail"></p>
            <p class="dash-card-meta">Member since <span id="memberSince"></span></p>
          </div>
          <button class="btn-manage" id="signOutBtnCard">Sign out</button>
        </div>
      </div>

    </div>
  </main>

  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
      'https://llabvdbcvilnbukroqxn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxsYWJ2ZGJjdmlsbmJ1a3JvcXhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTQzNzQsImV4cCI6MjA4OTI3MDM3NH0.WLdB5hNXMHJ63JGwgXgY8TEEGz7k5AVbsV7aVDy6xQU'
    );

    async function signOut() {
      await supabaseClient.auth.signOut();
      window.location.href = 'login.html';
    }

    document.getElementById('signOutBtn').addEventListener('click', signOut);
    document.getElementById('signOutBtnCard').addEventListener('click', signOut);

    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();

      if (!session) {
        window.location.href = 'login.html';
        return;
      }

      const user = session.user;
      const email = user.email;
      const createdAt = new Date(user.created_at).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      const firstName = email.split('@')[0];

      document.getElementById('navEmail').textContent = email;
      document.getElementById('greetingName').textContent = firstName + '.';
      document.getElementById('accountEmail').textContent = email;
      document.getElementById('memberSince').textContent = createdAt;
    })();
  </script>
</body>
</html>
