<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agrade signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #08080a;
      --white: #f4f3f0;
      --muted: rgba(244, 243, 240, 0.38);
      --surface: rgba(244, 243, 240, 0.04);
      --error: rgba(255, 100, 100, 0.85);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .page {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 100px;
    }

    .auth-wrap {
      width: 100%;
      max-width: 400px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s forwards;
    }

    .auth-title {
      font-family: 'Instrument Serif', serif;
      font-size: 2.2rem;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .auth-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 36px;
    }

    .ref-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(110, 231, 183, 0.08);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      color: #6ee7b7;
      margin-bottom: 24px;
    }

    .ref-badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #6ee7b7;
      box-shadow: 0 0 6px rgba(110,231,183,0.5);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 14px;
    }

    .form-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }

    .form-input {
      background: var(--surface);
      border: none;
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--white);
      outline: none;
      width: 100%;
      transition: background 0.2s;
    }

    .form-input:focus { background: rgba(244,243,240,0.07); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--white);
      color: var(--black);
      border: none;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 14px;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-submit:hover { opacity: 0.85; transform: scale(1.01); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .error-msg {
      margin-top: 14px;
      font-size: 0.75rem;
      color: var(--error);
      font-family: 'DM Mono', monospace;
      text-align: center;
      min-height: 1em;
    }

    .auth-switch {
      margin-top: 24px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 300;
    }

    .auth-switch a {
      color: var(--white);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .auth-switch a:hover { opacity: 0.7; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .page { padding: 60px 16px 60px; }
      .auth-title { font-size: 1.7rem; }
      .auth-wrap { max-width: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="auth-wrap">
      <p class="auth-title">Create account</p>
      <p class="auth-subtitle">Start your agrade journey today</p>

      <div id="refBadge" class="ref-badge" style="display:none">
        <div class="ref-badge-dot"></div>
        Referred by a friend
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="emailInput" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="passwordInput" />
      </div>
      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <input type="password" class="form-input" id="confirmPasswordInput" />
      </div>
      <button class="btn-submit" id="submitBtn">Create account</button>
      <p class="error-msg" id="errorMsg"></p>
      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </main>

  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
      'https://llabvdbcvilnbukroqxn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxsYWJ2ZGJjdmlsbmJ1a3JvcXhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTQzNzQsImV4cCI6MjA4OTI3MDM3NH0.WLdB5hNXMHJ63JGwgXgY8TEEGz7k5AVbsV7aVDy6xQU'
    );

    const params = new URLSearchParams(window.location.search);
    const ref = params.get('ref');

    if (ref) {
      document.getElementById('refBadge').style.display = 'inline-flex';
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const confirmPassword = document.getElementById('confirmPasswordInput').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      errorMsg.textContent = '';

      if (!email || !password || !confirmPassword) {
        errorMsg.textContent = 'Please fill in all fields.';
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters.';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      const { data, error } = await supabaseClient.auth.signUp({ email, password });

      if (error) {
        errorMsg.textContent = error.message;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
        return;
      }

      if (ref && data.session) {
        try {
          await fetch('https://agrade-cbwf.onrender.com/referral', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${data.session.access_token}`,
            },
            body: JSON.stringify({ ref }),
          });
        } catch (e) {
          console.error('Referral error:', e);
        }
      }

      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
