<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downloading agrade...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #08080a;
      color: #f4f3f0;
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.06em;
    }
    .msg { color: rgba(244, 243, 240, 0.38); }
    .dot {
      display: inline-block;
      animation: blink 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <p class="msg">Downloading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>
  <script>
    const link = document.createElement('a');
    link.href = 'https://github.com/Lethabo3/agrade/releases/latest/download/agrade_0.1.0_x64-setup.exe';
    link.download = 'agrade_0.1.0_x64-setup.exe';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    setTimeout(() => {
      window.location.href = 'install.html';
    }, 1500);
  </script>
</body>
</html>
