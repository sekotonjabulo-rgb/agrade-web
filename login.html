<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agrade login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #08080a;
      --white: #f4f3f0;
      --muted: rgba(244, 243, 240, 0.38);
      --surface: rgba(244, 243, 240, 0.04);
      --error: rgba(255, 100, 100, 0.85);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      transition: background 0.3s;
    }

    nav.scrolled {
      background: rgba(8, 8, 10, 0.9);
      backdrop-filter: blur(20px);
    }

    .nav-logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.4rem;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .nav-link {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-link:hover { color: var(--white); }

    .page {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 100px;
    }

    .auth-wrap {
      width: 100%;
      max-width: 400px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s forwards;
    }

    .auth-title {
      font-family: 'Instrument Serif', serif;
      font-size: 2.2rem;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .auth-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 36px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 14px;
    }

    .form-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }

    .form-input {
      background: var(--surface);
      border: none;
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--white);
      outline: none;
      width: 100%;
      transition: background 0.2s;
    }

    .form-input:focus { background: rgba(244,243,240,0.07); }

    .form-footer {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 28px;
      margin-top: -6px;
    }

    .form-link {
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      transition: color 0.2s;
    }

    .form-link:hover { color: var(--white); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--white);
      color: var(--black);
      border: none;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-submit:hover { opacity: 0.85; transform: scale(1.01); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .error-msg {
      margin-top: 14px;
      font-size: 0.75rem;
      color: var(--error);
      font-family: 'DM Mono', monospace;
      text-align: center;
      min-height: 1em;
    }

    .auth-switch {
      margin-top: 24px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 300;
    }

    .auth-switch a {
      color: var(--white);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .auth-switch a:hover { opacity: 0.7; }

    footer {
      position: relative;
      z-index: 1;
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.1rem;
      color: var(--white);
      text-decoration: none;
    }

    .footer-links {
      display: flex;
      gap: 28px;
    }

    .footer-link {
      font-size: 0.65rem;
      color: rgba(244,243,240,0.2);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }

    .footer-link:hover { color: var(--muted); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="auth-wrap">
      <p class="auth-title">Welcome back</p>
      <p class="auth-subtitle">Sign in to your agrade account</p>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="emailInput" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="passwordInput" />
      </div>
      <div class="form-footer">
        <a href="#" class="form-link">Forgot password?</a>
      </div>
      <button class="btn-submit" id="submitBtn">Log in</button>
      <p class="error-msg" id="errorMsg"></p>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </main>

  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
      'https://llabvdbcvilnbukroqxn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxsYWJ2ZGJjdmlsbmJ1a3JvcXhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTQzNzQsImV4cCI6MjA4OTI3MDM3NH0.WLdB5hNXMHJ63JGwgXgY8TEEGz7k5AVbsV7aVDy6xQU'
    );

    window.addEventListener('scroll', () => {
      document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
    });

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      errorMsg.textContent = '';

      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = error.message;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
        return;
      }

      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
